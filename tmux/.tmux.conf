# ═══════════════════════════════════════════════════════════════════════════
#  ~/.tmux.conf — N E O N   D R E A M S
#  zsh + tmux + claude. butter-smooth.
#  Author: Christian M. Todie <chris@todie.io>
# ═══════════════════════════════════════════════════════════════════════════
#
#  Cheatsheet (PREFIX = Ctrl+Space — easy on the wrists, no thumb yoga):
#
#    SPLITS                          NAVIGATION (vim hjkl)
#      |        horizontal split       h j k l   move pane
#      -        vertical split         H J K L   resize pane (repeat)
#      \        full-width vertical    Alt+←↑↓→  move pane (no prefix)
#      _        full-height horizontal Alt+1..9  jump to window N
#      c        new window             Tab       toggle to last window
#      C        new window in $HOME
#
#    LAYOUTS (instant agent teams)   POPUPS (no prefix needed)
#      T        3-pane lead+2          C-g       lazygit fullscreen
#      F        4-pane 2x2 grid        C-f       fzf session switcher
#      S        5-pane lead+squad      C-n       new project session
#      M        main-vertical 75/25    C-/       claude-esp tail
#
#    CLAUDE                          UTILITY
#      e        spawn claude-esp side  r         reload config
#      E        run /claude-esp pop    R         rename window
#      L        claude-tmux-layout     a         broadcast on/off
#      C-c      copy mode (vi)         m         mark pane / M jump
#                                      x         kill pane (no prompt)
#                                      X         kill window
#                                      z         zoom toggle (built-in)
#
#    THEME: deep void purple (#0d0221) base, hot neon pink (#ff2975) accents,
#           electric cyan (#00f0ff) for active state. Synthwave cathedral.
#
# ═══════════════════════════════════════════════════════════════════════════

# ── Core ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,alacritty:RGB,wezterm:RGB"
set -ag terminal-features ",xterm-256color:usstyle"
set -g default-shell ${SHELL}
set -g mouse on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g allow-rename off
set -g visual-bell off
set -g bell-action none
set -g aggressive-resize on
set -g display-time 1500
set -g display-panes-time 2000
set -g status-keys vi
setw -g mode-keys vi
setw -g monitor-activity on
setw -g visual-activity off

# ── Prefix: Ctrl-Space ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind Space last-window

# ── Splits — keep current path ────────────────────────────────────────────
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind '\' split-window -fh -c "#{pane_current_path}"
bind '_' split-window -fv -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind C new-window -c "$HOME"
unbind '"'
unbind %

# ── Vim-style pane navigation ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── No-prefix navigation ──────────────────────────────────────────────────
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-h     select-pane -L
bind -n M-j     select-pane -D
bind -n M-k     select-pane -U
bind -n M-l     select-pane -R

# Window jumps without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10
bind -n M-Tab next-window
bind -n M-BTab previous-window

# Pane swap
bind -r '<' swap-window -d -t -1
bind -r '>' swap-window -d -t +1

# ── Reload + display ──────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "▲ neon dreams reloaded"
bind R command-prompt -I "#W" "rename-window '%%'"

# ── Copy mode (vi-style) ──────────────────────────────────────────────────
bind Enter copy-mode
bind C-c copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "tmux-copy"
bind -T copy-mode-vi Y send -X copy-line
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "tmux-copy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi / command-prompt -i -p "search↓" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "search↑" "send -X search-backward-incremental \"%%%\""

# ── Pane marks (vim-style) ────────────────────────────────────────────────
bind m select-pane -m
bind M switch-client -t '{marked}'

# ── Kill — no confirmation ────────────────────────────────────────────────
bind x kill-pane
bind X confirm-before -p "kill window #W? (y/n)" kill-window
bind C-x confirm-before -p "kill session #S? (y/n)" kill-session

# ── Broadcast toggle ──────────────────────────────────────────────────────
bind a setw synchronize-panes \; display "◉ broadcast #{?synchronize-panes,ON,OFF}"

# ═══════════════════════════════════════════════════════════════════════════
#  AGENT TEAMS — instant layouts for multi-pane Claude work
# ═══════════════════════════════════════════════════════════════════════════

# T — 3-pane: lead left (60%), 2 stacked teammates right
bind T split-window -h -p 40 -c "#{pane_current_path}" \; \
       split-window -v -c "#{pane_current_path}" \; \
       select-pane -L

# F — 4-pane 2x2 tiled grid
bind F split-window -h -c "#{pane_current_path}" \; \
       split-window -v -c "#{pane_current_path}" \; \
       select-pane -L \; \
       split-window -v -c "#{pane_current_path}" \; \
       select-layout tiled

# S — 5-pane: lead top (60% height), 4 teammates bottom row
bind S split-window -v -p 40 -c "#{pane_current_path}" \; \
       split-window -h -c "#{pane_current_path}" \; \
       split-window -h -c "#{pane_current_path}" \; \
       split-window -h -c "#{pane_current_path}" \; \
       select-layout tiled \; \
       resize-pane -t 0 -y 60% \; \
       select-pane -t 0

# M — main-vertical 75/25 (one big pane left, esp/log right)
bind M split-window -h -p 25 -c "#{pane_current_path}" \; \
       select-pane -L

# ═══════════════════════════════════════════════════════════════════════════
#  CLAUDE CODE INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════

# e — spawn claude-esp in a side pane (25% width, right)
bind e split-window -h -p 25 -c "#{pane_current_path}" "claude-esp" \; \
       select-pane -L

# E — claude-esp in a popup (overlay, no pane permanent)
bind E display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "claude-esp"

# L — claude-tmux-layout helper (project + esp side pane)
bind L run-shell "claude-tmux-layout"

# ═══════════════════════════════════════════════════════════════════════════
#  POPUPS — overlay tools, no prefix where safe
# ═══════════════════════════════════════════════════════════════════════════

# C-g — lazygit fullscreen popup
bind -n C-g if-shell "command -v lazygit >/dev/null 2>&1" \
  "display-popup -E -w 95% -h 95% -d '#{pane_current_path}' lazygit" \
  "display-popup -E -w 80% -h 60% -d '#{pane_current_path}' 'git status; echo; echo press q to close; read'"

# C-f — fzf session switcher popup
bind -n C-f display-popup -E -w 60% -h 50% "tmux-sessionizer || tmux-fzf-session"

# C-n — new project session prompt
bind -n C-n command-prompt -p "new session name:" "new-session -d -s '%%' -c '#{pane_current_path}'; switch-client -t '%%'"

# C-/ — claude-esp popup tail (uses C-/ which most terminals send as C-_)
bind -n 'C-_' display-popup -E -w 90% -h 80% "claude-esp"

# Quick git status + branch popup
bind g display-popup -E -w 80% -h 60% -d "#{pane_current_path}" "git status; echo; git log --oneline -10; echo; read -p 'q to close'"

# ═══════════════════════════════════════════════════════════════════════════
#  STATUS BAR — N E O N   D R E A M S
# ═══════════════════════════════════════════════════════════════════════════
#
#  Palette:
#    void:    #0d0221  base background
#    panel:   #160b3b  panel surface
#    pink:    #ff2975  hot pink (active, alerts)
#    cyan:    #00f0ff  electric cyan (active windows)
#    purple:  #b026ff  ultraviolet (user, secondary)
#    yellow:  #ffdf00  sunset gold (date, warnings)
#    green:   #5af78e  matrix green (good state)
#    dim:     #4a3f6b  muted lavender (inactive)
#
# ── Position + style ─────────────────────────────────────────────────────
set -g status on
set -g status-position top
set -g status-interval 2
set -g status-justify left

set -g status-style "bg=#0d0221,fg=#a89bd6"
set -g pane-border-style "fg=#2d1f4f"
set -g pane-active-border-style "fg=#ff2975"
set -g message-style "bg=#ff2975,fg=#0d0221,bold"
set -g message-command-style "bg=#b026ff,fg=#0d0221,bold"
set -g mode-style "bg=#b026ff,fg=#0d0221,bold"
set -g display-panes-active-colour "#ff2975"
set -g display-panes-colour "#00f0ff"

# ── Status left ───────────────────────────────────────────────────────────
# Format: ▲ session ▶ user ▶ ...
set -g status-left-length 60
set -g status-left "#[fg=#0d0221,bg=#ff2975,bold] ▲ #S #[fg=#ff2975,bg=#b026ff,nobold]#[fg=#0d0221,bg=#b026ff,bold] #(whoami)@#h #[fg=#b026ff,bg=#0d0221,nobold] "

# ── Window tabs (centered area) ──────────────────────────────────────────
setw -g window-status-separator ""
setw -g window-status-format         "#[fg=#4a3f6b,bg=#0d0221] #I:#W#{?window_zoomed_flag, ⊕,}#{?window_last_flag, ‹,} "
setw -g window-status-current-format "#[fg=#0d0221,bg=#00f0ff,bold] #I:#W#{?window_zoomed_flag, ⊕,} #[fg=#00f0ff,bg=#0d0221,nobold]"
setw -g window-status-activity-style "fg=#ffdf00,blink"
setw -g window-status-bell-style     "fg=#ff2975,blink,bold"

# ── Status right ─────────────────────────────────────────────────────────
# Format: claude-state ▶ git branch ▶ time ▶ date
set -g status-right-length 140
set -g status-right "#[fg=#160b3b,bg=#0d0221]#[fg=#5af78e,bg=#160b3b] #(tmux-claude-state) #[fg=#160b3b,bg=#0d0221] #[fg=#2d1f4f,bg=#0d0221]#[fg=#00f0ff,bg=#2d1f4f] #(tmux-git-branch '#{pane_current_path}') #[fg=#ff2975,bg=#2d1f4f]#[fg=#0d0221,bg=#ff2975,bold] %H:%M #[fg=#ffdf00,bg=#ff2975]#[fg=#0d0221,bg=#ffdf00,bold] %b-%d "

# ── Clock mode ────────────────────────────────────────────────────────────
set -g clock-mode-colour "#ff2975"
set -g clock-mode-style 24

# ── Optional: source machine-local overrides ─────────────────────────────
if-shell "[ -f ~/.tmux.local.conf ]" "source-file ~/.tmux.local.conf"
if-shell "[ -f ~/.tmux.conf.d/claude.conf ]" "source-file ~/.tmux.conf.d/claude.conf"

# ═══════════════════════════════════════════════════════════════════════════
#  END
# ═══════════════════════════════════════════════════════════════════════════
